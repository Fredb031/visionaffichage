name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vite build
  bundle-size:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Build + capture size
        run: |
          npx vite build 2>&1 | tee build.log
          echo "## Bundle sizes (top 10 JS chunks)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^dist/assets/.*\.js" build.log | sort -k 2 -h -r | head -10 >> $GITHUB_STEP_SUMMARY || echo "No JS chunks found in build log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Warn on large chunks
        run: |
          LARGE=$(grep -E "^dist/assets/.*\.js" build.log | awk '{ if ($2+0 > 500 && $3 ~ /kB/) print $0 }' || true)
          if [ -n "$LARGE" ]; then
            echo "::warning::Chunks larger than 500kB detected:"
            echo "$LARGE" | while IFS= read -r line; do echo "::warning::$line"; done
            echo "### Large chunks (>500kB)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$LARGE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
