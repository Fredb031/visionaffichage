name: Autonomous Site Agent

# Triggers a Claude Managed Agents session every 6 hours to audit the site
# and commit incremental improvements to the autonomous-improvements branch.
#
# The agent itself runs in an Anthropic-hosted container (visible in
# console.anthropic.com). This workflow just spawns the session.
#
# Triggered by:
#   - Schedule:     every 6 hours (UTC)
#   - Manual:       workflow_dispatch
#
# Required repo secrets:
#   - ANTHROPIC_API_KEY   — your console.anthropic.com API key
#   - ANTHROPIC_ENV_ID    — from running `npm run setup` in scripts/autonomous-agent
#   - ANTHROPIC_AGENT_ID  — from running `npm run setup` in scripts/autonomous-agent
#   - GH_PAT              — GitHub PAT with `repo` scope (for the agent's clone + push)

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area for this run (optional)'
        required: false
        default: ''
      max_changes:
        description: 'Max files to change (default 3)'
        required: false
        default: '3'

concurrency:
  group: autonomous-agent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/autonomous-agent/package.json

      - name: Install agent dependencies
        working-directory: scripts/autonomous-agent
        run: npm install --no-audit --no-fund

      - name: Spawn Managed Agents session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ENV_ID: ${{ secrets.ANTHROPIC_ENV_ID }}
          ANTHROPIC_AGENT_ID: ${{ secrets.ANTHROPIC_AGENT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FOCUS: ${{ github.event.inputs.focus }}
          MAX_CHANGES: ${{ github.event.inputs.max_changes || '3' }}
          RUN_ID: ${{ github.run_id }}
        working-directory: scripts/autonomous-agent
        run: npm run run
