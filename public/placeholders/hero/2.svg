<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="hero-detail-logo">
  <defs>
    <radialGradient id="logo-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#F8F7F3"/>
      <stop offset="100%" stop-color="#F0ECE4"/>
    </radialGradient>
    <pattern id="logo-weave" patternUnits="userSpaceOnUse" width="6" height="6">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#5C636B" stroke-opacity="0.06" stroke-width="0.8"/>
    </pattern>
    <filter id="logo-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#logo-bg)"/>
  <rect width="600" height="600" fill="url(#logo-weave)"/>

  <!-- Stitched logo mark: 3 abstract strokes forming a "V" + bar -->
  <g filter="url(#logo-shadow)" stroke="#101114" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="220" y1="220" x2="300" y2="380"/>
    <line x1="380" y1="220" x2="300" y2="380"/>
    <line x1="240" y1="430" x2="360" y2="430" stroke-width="10"/>
  </g>

  <!-- stitch-dash overlay on the strokes to imply embroidery -->
  <g stroke="#F8F7F3" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 6" fill="none" opacity="0.5">
    <line x1="220" y1="220" x2="300" y2="380"/>
    <line x1="380" y1="220" x2="300" y2="380"/>
  </g>

  <!-- tiny caption: stitch density -->
  <text x="36" y="572" font-family="Inter, system-ui" font-size="11" fill="undefined" font-weight="500" letter-spacing="1.6">LOGO · BRODERIE 12K POINTS</text>
</svg>
