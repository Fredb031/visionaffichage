<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets env(safe-area-inset-*) reach the screen
         edges on iPhone X+ so the BottomNav and AIChat FAB align with
         the home indicator instead of leaving a gutter. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Vision Affichage — Merch d'entreprise personnalisé</title>
    <meta name="description" content="Personnalise tes vêtements corporatifs avec ton logo. Hoodies, t-shirts, casquettes. Livré en 5 jours, aucun minimum. +500 entreprises habillées." />
    <meta name="author" content="Vision Affichage" />
    <meta name="theme-color" content="#1B3A6B" />

    <!-- Favicon — full standard set.
         .ico for legacy browsers (IE/older Edge), .svg for modern browsers
         (scales crisply at any DPI), discrete 16/32 PNGs for browsers that
         ignore SVG, 180×180 apple-touch-icon for iOS home-screen, and a
         mask-icon with brand navy for Safari pinned tabs. PNG/ICO binaries
         are owner-uploads (see /public/icons/README.md). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#1B3A6B" />

    <!-- PWA manifest — lets users 'Add to Home Screen' on mobile and
         controls the theme/color of the installed app. manifest.json is
         the canonical PWA manifest (full icon set incl. maskable);
         manifest.webmanifest is kept for legacy/back-compat. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Vision" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Vision Affichage" />
    <meta property="og:title" content="Vision Affichage — Merch d'entreprise personnalisé" />
    <meta property="og:description" content="Personnalise tes vêtements corporatifs avec ton logo. Hoodies, t-shirts, casquettes. Livré en 5 jours. +500 entreprises habillées." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://visionaffichage.com" />
    <meta property="og:image" content="https://cdn.shopify.com/s/files/1/0578/1038/7059/files/c85663f5-e0c1-43ce-a427-00852120bc46.jpg?v=1763532442&width=1200" />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:locale:alternate" content="en_CA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vision Affichage — Merch d'entreprise" />
    <meta name="twitter:description" content="Ton logo sur tes vêtements en 5 jours. Aucun minimum." />
    <meta name="twitter:image" content="https://cdn.shopify.com/s/files/1/0578/1038/7059/files/c85663f5-e0c1-43ce-a427-00852120bc46.jpg?v=1763532442&width=1200" />

    <!-- Canonical -->
    <link rel="canonical" href="https://visionaffichage.com" />

    <!-- Hreflang: the page serves both fr-CA and en-CA from the same URL
         (the user toggles language client-side). Declaring both tells
         Google that this URL is a valid hit for either-language queries
         rather than preferring English-only results. -->
    <link rel="alternate" hreflang="fr-CA" href="https://visionaffichage.com" />
    <link rel="alternate" hreflang="en-CA" href="https://visionaffichage.com" />
    <link rel="alternate" hreflang="x-default" href="https://visionaffichage.com" />

    <!-- Preconnect to CDN for faster image loads -->
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.shopify.com" />
    <link rel="preconnect" href="https://visionaffichage.com" />
    <!-- Shopify Storefront API (used on every page for product data) -->
    <link rel="preconnect" href="https://visionaffichage-com.myshopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://visionaffichage-com.myshopify.com" />
    <!-- Supabase (used for AI chat, SanMar inventory, logo storage) -->
    <link rel="preconnect" href="https://fpljtwaqoldcoxgjtqgv.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://fpljtwaqoldcoxgjtqgv.supabase.co" />
    <!-- Google Fonts — Plus Jakarta Sans + Lora are pulled via @import in
         src/index.css. Without these preconnects the browser had to wait
         until the CSS parsed before opening the TLS handshakes to
         fonts.googleapis.com (CSS shell) and fonts.gstatic.com (the
         actual font files), adding ~200-400ms of FOIT on first load.
         The crossorigin attr is required on the gstatic preconnect
         because the font fetches are CORS-attributed. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Vision Affichage blueprint typography stack: Outfit (display
         headlines, 300-900), Inter (body, 400-700), JetBrains Mono
         (prices/SKUs, 400-600). One consolidated stylesheet with
         display=swap so text paints in fallback fonts immediately and
         swaps in once the web font arrives, eliminating FOIT. Tailwind's
         font-display / font-sans / font-mono utilities pick up these
         families via theme.extend.fontFamily in tailwind.config.ts. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <!-- Master Prompt typography stack — Syne (display) + Inter (body)
         + JetBrains Mono. Additive load: browser dedupes any
         already-cached families so the duplicate Inter/JetBrains decls
         are free, and Syne becomes available for new Master-Prompt
         sections without disturbing the Outfit-driven blueprint pages. -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Preload the LCP hero image so it kicks off in the same wave as
         the HTML parse instead of waiting for the React bundle to mount
         the <img>, shaving ~300-600ms off Largest Contentful Paint on
         3G/4G first-paint. -->
    <link rel="preload" as="image" href="/hero-team.webp">

    <!-- Security headers (CSP) — Task 14.1.
         NOTE: this is a meta-level Content-Security-Policy. It's weaker
         than a real HTTP response header: `frame-ancestors` and CSP
         reporting directives are IGNORED when delivered via <meta>. The
         production deployment (Vercel / Cloudflare) SHOULD also set a
         real `Content-Security-Policy` response header that adds
         `frame-ancestors 'none'` + `report-uri` / `report-to`. This meta
         tag is the first line of defense against injected scripts and
         img beacons pointing at unexpected origins; it allow-lists all
         our real external origins (Shopify storefront + CDN, Supabase,
         Google Fonts, Google Maps embed, Zapier webhook, GitHub API). -->
    <!-- IMPORTANT: `*.shopify.com` does NOT match `*.myshopify.com` — `myshopify.com`
         is a separate apex domain that hosts every Shopify storefront's permanent
         API origin (e.g. visionaffichage-com.myshopify.com). Both must be allow-listed
         explicitly in connect-src/img-src/form-action or the Storefront API call from
         every PDP and product grid is blocked by CSP and the page renders a blank
         "Couldn't load this product" state on direct URL access. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https://cdn.shopify.com https://*.shopify.com https://*.myshopify.com https://*.supabase.co https://www.google.com https://maps.gstatic.com https://www.facebook.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net; connect-src 'self' https://*.shopify.com https://*.myshopify.com https://*.supabase.co https://hooks.zapier.com https://api.github.com https://www.facebook.com https://api.openai.com https://api.replicate.com https://api.remove.bg https://tools.purolator.com https://www.canadapost-postescanada.ca; form-action 'self' https://*.shopify.com https://*.myshopify.com; frame-src 'self' https://www.google.com https://www.google.com/maps/; object-src 'none'; base-uri 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- JSON-LD LocalBusiness schema (Mega Blueprint Section 08.1).
         Upgraded from a plain Organization schema: LocalBusiness adds
         the Blainville address, opening hours, aggregateRating, and
         sameAs social links so the SERP can render a full knowledge
         panel (rating stars, hours, map, social icons). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Vision Affichage",
      "url": "https://visionaffichage.com",
      "logo": "https://cdn.shopify.com/s/files/1/0578/1038/7059/files/Asset_1_d5d82510-0b83-4657-91b7-3ac1992ee697.svg?height=90&v=1769614651",
      "image": "https://cdn.shopify.com/s/files/1/0578/1038/7059/files/c85663f5-e0c1-43ce-a427-00852120bc46.jpg?v=1763532442&width=1200",
      "description": "Vetements d'entreprise personnalises livres en 5 jours ouvrables au Quebec. T-shirts, polos, hoodies, vestes et casquettes imprimes avec votre logo.",
      "telephone": "+13673804808",
      "email": "info@visionaffichage.com",
      "address": { "@type": "PostalAddress", "addressLocality": "Blainville", "addressRegion": "QC", "addressCountry": "CA" },
      "areaServed": { "@type": "State", "name": "Quebec" },
      "openingHoursSpecification": [{ "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"], "opens": "08:00", "closes": "18:00" }],
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5.0", "reviewCount": "52", "bestRating": "5" },
      "priceRange": "$$",
      "sameAs": ["https://www.facebook.com/visionaffichage", "https://www.instagram.com/visionaffichage"]
    }
    </script>

    <!-- Meta Pixel — Volume II Section 08.1.
         Law 25 fix: the Pixel script no longer eager-loads here. Even
         the script DOWNLOAD itself sets an `fr` cookie before the
         visitor consents, which violates Québec's Law 25 opt-in
         requirement. The full lazy bootstrap (queue stub + script
         injection + init) now lives in src/lib/analytics.ts and runs
         only after marketing consent flips true. Operator must drop the
         real Pixel ID into META_PIXEL_ID inside analytics.ts and follow
         up with the CAPI server-side mirror via Supabase edge function
         (`META_ACCESS_TOKEN` secret) for iOS-blocking-resistant
         attribution. -->
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width:640px;margin:60px auto;padding:32px;font-family:system-ui,sans-serif;text-align:center;color:#1B3A6B;">
        <h1 style="font-size:22px;margin-bottom:12px;">Vision Affichage</h1>
        <p style="color:#555;margin-bottom:16px;">
          Ce site a besoin de JavaScript pour fonctionner. Active-le et rafraîchis la page, ou écris-nous à
          <a href="mailto:info@visionaffichage.com" style="color:#0052CC;">info@visionaffichage.com</a>
          pour commander.
        </p>
        <p style="color:#888;font-size:13px;">
          This site needs JavaScript. Enable it and reload, or email us to order directly.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
