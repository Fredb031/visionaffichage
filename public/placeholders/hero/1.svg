<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img" aria-label="hero-feature">
  <defs>
    <radialGradient id="hero-feat-bg" cx="48%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#F8F7F3"/>
      <stop offset="60%" stop-color="#F0ECE4"/>
      <stop offset="100%" stop-color="#E4DDCD"/>
    </radialGradient>
    <filter id="hero-feat-shadow" x="-25%" y="-15%" width="150%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hero-feat-shadow-soft" x="-25%" y="-15%" width="150%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="22"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#hero-feat-bg)"/>

  <!-- ruler tick marks at right edge for "real photo" feel -->
  <g stroke="#5C636B" stroke-opacity="0.18" stroke-width="1">
    <line x1="778" y1="60" x2="788" y2="60"/>
    <line x1="784" y1="120" x2="788" y2="120"/>
    <line x1="784" y1="180" x2="788" y2="180"/>
    <line x1="778" y1="240" x2="788" y2="240"/>
    <line x1="784" y1="300" x2="788" y2="300"/>
    <line x1="784" y1="360" x2="788" y2="360"/>
    <line x1="778" y1="420" x2="788" y2="420"/>
  </g>

  <!-- BOTTOM tee: ink-800, rotated +6deg, larger shadow -->
  <g transform="translate(80,140) rotate(6 320 380)" filter="url(#hero-feat-shadow-soft)">
    <path d="M 260 220 Q 330 190 360 205 Q 400 245 440 205 Q 470 190 540 220 L 640 280 Q 660 310 635 345 L 560 330 L 555 740 Q 540 770 490 775 Q 400 785 310 775 Q 260 770 245 740 L 240 330 L 165 345 Q 140 310 160 280 Z" fill="#1D2127" transform="translate(-80,40) scale(0.86)"/>
  </g>
  <text x="450" y="780" font-family="Inter, system-ui" font-size="14" fill="#D2C7B0" font-weight="500" letter-spacing="1.2">ATC1015 · INK</text>

  <!-- MIDDLE tee: sand-100, rotated -3deg -->
  <g transform="translate(120,90) rotate(-3 320 360)" filter="url(#hero-feat-shadow)">
    <path d="M 260 220 Q 330 190 360 205 Q 400 245 440 205 Q 470 190 540 220 L 640 280 Q 660 310 635 345 L 560 330 L 555 740 Q 540 770 490 775 Q 400 785 310 775 Q 260 770 245 740 L 240 330 L 165 345 Q 140 310 160 280 Z" fill="#F0ECE4" stroke="#D2C7B0" stroke-width="1.5" transform="translate(-60,30) scale(0.84)"/>
  </g>
  <text x="500" y="540" font-family="Inter, system-ui" font-size="14" fill="undefined" font-weight="500" letter-spacing="1.2">ATC1015 · SAND</text>

  <!-- TOP tee: slate-700, slight rotation +1deg, smallest shadow -->
  <g transform="translate(160,40) rotate(1 320 340)" filter="url(#hero-feat-shadow)">
    <path d="M 260 220 Q 330 190 360 205 Q 400 245 440 205 Q 470 190 540 220 L 640 280 Q 660 310 635 345 L 560 330 L 555 740 Q 540 770 490 775 Q 400 785 310 775 Q 260 770 245 740 L 240 330 L 165 345 Q 140 310 160 280 Z" fill="#35556D" transform="translate(-40,20) scale(0.82)"/>
  </g>
  <text x="540" y="320" font-family="Inter, system-ui" font-size="14" fill="undefined" font-weight="500" letter-spacing="1.2">ATC1015 · SLATE</text>

  <!-- micro caption bottom-left: studio-flat reference -->
  <text x="40" y="968" font-family="Inter, system-ui" font-size="12" fill="undefined" font-weight="500" letter-spacing="2">FLAT-LAY · 3 / 24 colorways</text>
  <line x1="40" y1="978" x2="160" y2="978" stroke="#5C636B" stroke-opacity="0.25" stroke-width="1"/>
</svg>
