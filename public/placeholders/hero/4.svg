<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="hero-detail-qc">
  <defs>
    <radialGradient id="qc-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#F8F7F3"/>
      <stop offset="100%" stop-color="#F0ECE4"/>
    </radialGradient>
    <radialGradient id="qc-emboss" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="qc-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#qc-bg)"/>

  <g filter="url(#qc-shadow)">
    <!-- outer ring -->
    <circle cx="300" cy="300" r="200" fill="#101114"/>
    <circle cx="300" cy="300" r="200" fill="url(#qc-emboss)"/>
    <!-- inner ring -->
    <circle cx="300" cy="300" r="172" fill="none" stroke="#F0ECE4" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="300" cy="300" r="156" fill="none" stroke="#F0ECE4" stroke-opacity="0.18" stroke-width="1"/>
    <!-- fleur de lys (abstract) -->
    <g fill="#F0ECE4" transform="translate(300 264)">
      <path d="M0 -28 L8 -10 L20 -8 L10 4 L14 22 L0 14 L-14 22 L-10 4 L-20 -8 L-8 -10 Z"/>
    </g>
    <!-- wordmark -->
    <text x="300" y="318" font-family="Inter, system-ui" font-size="22" font-weight="700" fill="#F0ECE4" text-anchor="middle" letter-spacing="3">FAIT AU</text>
    <text x="300" y="350" font-family="Inter, system-ui" font-size="22" font-weight="700" fill="#F0ECE4" text-anchor="middle" letter-spacing="3">QUÉBEC</text>
    <!-- top arc tick marks -->
    <g stroke="#F0ECE4" stroke-opacity="0.45" stroke-width="1.4" fill="none">
      <line x1="220" y1="390" x2="240" y2="390"/>
      <line x1="360" y1="390" x2="380" y2="390"/>
    </g>
    <text x="300" y="396" font-family="Inter, system-ui" font-size="10" font-weight="500" fill="#F0ECE4" fill-opacity="0.55" text-anchor="middle" letter-spacing="2">QC · ATELIER</text>
  </g>

  <text x="36" y="572" font-family="Inter, system-ui" font-size="11" fill="undefined" font-weight="500" letter-spacing="1.6">QC BADGE · ATELIER #03</text>
</svg>
