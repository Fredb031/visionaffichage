<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="hero-detail-fabric">
  <defs>
    <linearGradient id="fab-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35556D"/>
      <stop offset="100%" stop-color="#1D2127"/>
    </linearGradient>
    <pattern id="weave-warp" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
    </pattern>
    <pattern id="weave-weft" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#000000" stroke-opacity="0.10" stroke-width="2"/>
    </pattern>
    <radialGradient id="fab-vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#fab-bg)"/>
  <rect width="600" height="600" fill="url(#weave-warp)"/>
  <rect width="600" height="600" fill="url(#weave-weft)"/>
  <rect width="600" height="600" fill="url(#fab-vignette)"/>

  <!-- single highlight thread crossing -->
  <line x1="0" y1="372" x2="600" y2="228" stroke="#F0ECE4" stroke-opacity="0.18" stroke-width="2"/>

  <text x="36" y="572" font-family="Inter, system-ui" font-size="11" fill="#F0ECE4" fill-opacity="0.55" font-weight="500" letter-spacing="1.6">TISSU · 6.1 OZ COTON</text>
</svg>
